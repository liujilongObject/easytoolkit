<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 宣纸底色 -->
  <rect width="32" height="32" rx="3" fill="#FAF8F4"/>

  <!-- 朱砂印章：微旋转 -3° 模拟手工盖印 -->
  <g transform="rotate(-3 16 16)">
    <!-- 胭脂红双线印框 -->
    <rect x="4.5" y="4.5" width="23" height="23" rx="1.5" fill="none" stroke="#9F3A44" stroke-width="1.8"/>
    <rect x="6.5" y="6.5" width="19" height="19" rx="1" fill="none" stroke="#9F3A44" stroke-width="0.8"/>

    <!-- 极简几何「E」字 — 三横一竖，胭脂红粗笔画 -->
    <!-- 左竖 -->
    <rect x="10" y="10" width="2.6" height="12" fill="#9F3A44" rx="0.3"/>
    <!-- 上横 -->
    <rect x="10" y="10" width="11" height="2.4" fill="#9F3A44" rx="0.3"/>
    <!-- 中横（略短，更具呼吸感） -->
    <rect x="10" y="14.8" width="8" height="2.4" fill="#9F3A44" rx="0.3"/>
    <!-- 下横 -->
    <rect x="10" y="19.6" width="11" height="2.4" fill="#9F3A44" rx="0.3"/>

    <!-- 竹翠绿点缀：右上角小圆点（落款"闲章"效果） -->
    <circle cx="23" cy="9" r="1.3" fill="#3A6750"/>
  </g>
</svg>
